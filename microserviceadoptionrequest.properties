server.port=${PORT:9093}

#hibernate config
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update


#database config
spring.datasource.url=jdbc:mysql://${DB_IP:localhost}:${DB_PORT:3306}/${DB_NAME:microserviceadptionrequest}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:abc123}

#eureka config
eureka.client.service-url.defaultZone=http://${EUREKA_IP:localhost}:${EUREKA_PORT:9999}/eureka